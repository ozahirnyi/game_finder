version: "3.9"


services:
  app:
    build: .
    container_name: gamefinder-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RAWG_API_KEY: ${RAWG_API_KEY}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    depends_on:
      - db
      - redis
  db:
    image: postgres:15
    container_name: gamefinder-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gamefinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: gamefinder-redis
    ports:
      - "6379:6379"


volumes:
  postgres_data:
