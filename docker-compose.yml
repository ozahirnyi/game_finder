services:
  app:
    build: .
    container_name: gamefinder-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-8}
      AI_FALLBACK_ENABLED: ${AI_FALLBACK_ENABLED:-true}
      RAWG_API_KEY: ${RAWG_API_KEY}
      RAWG_TIMEOUT_SECONDS: ${RAWG_TIMEOUT_SECONDS:-12}
      STEAM_API_KEY: ${STEAM_API_KEY}
      ITAD_API_KEY: ${ITAD_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      PRICE_ALERT_WATCHER_ENABLED: ${PRICE_ALERT_WATCHER_ENABLED:-false}
      PRICE_ALERT_INTERVAL_SECONDS: ${PRICE_ALERT_INTERVAL_SECONDS:-86400}
      PRICE_ALERT_INITIAL_DELAY_SECONDS: ${PRICE_ALERT_INITIAL_DELAY_SECONDS:-60}
      PRICE_ALERT_MIN_CUT: ${PRICE_ALERT_MIN_CUT:-1}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    depends_on:
      - db
      - redis
  steam-social-refresh-worker:
    build: .
    command:
      - sh
      - -c
      - while true; do python -m scripts.run_steam_social_refresh; sleep "$${STEAM_SOCIAL_REFRESH_INTERVAL_SECONDS:-300}"; done
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      STEAM_API_KEY: ${STEAM_API_KEY}
      STEAM_SOCIAL_REFRESH_STALE_MINUTES: ${STEAM_SOCIAL_REFRESH_STALE_MINUTES:-60}
      STEAM_SOCIAL_REFRESH_BATCH_SIZE: ${STEAM_SOCIAL_REFRESH_BATCH_SIZE:-25}
      STEAM_SOCIAL_REFRESH_INTERVAL_SECONDS: ${STEAM_SOCIAL_REFRESH_INTERVAL_SECONDS:-300}
    depends_on:
      - db
  db:
    image: postgres:15
    container_name: gamefinder-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gamefinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: gamefinder-redis
    ports:
      - "6379:6379"


volumes:
  postgres_data:
